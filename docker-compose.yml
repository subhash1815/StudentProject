services:
  postgres:
    image: postgres:16
    container_name: daily-habit-tracker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: daily_habit_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d daily_habit_tracker"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
